name: Actualizar tasas BCV

on:
  schedule:
    - cron: '40 13 * * 1-5'
    - cron: '0 18 * * 1-5'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias del sistema (CORREGIDO)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libgbm1

      - name: Instalar Google Chrome (forma correcta)
        uses: browser-actions/setup-chrome@v1

      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pip
          pip install selenium gspread google-auth

      - name: Ejecutar scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          WORKSHEET_NAME: ${{ secrets.WORKSHEET_NAME }}
          DATE_CELL: ${{ secrets.DATE_CELL }}
          EURO_CELL: ${{ secrets.EURO_CELL }}
          DOLAR_CELL: ${{ secrets.DOLAR_CELL }}
        run: python bcv_to_sheets.py
