name: Actualizar tasas BCV

on:
  schedule:
    - cron: '40 13 * * 1-5'   # 9:40 am Caracas
    - cron: '0 18 * * 1-5'    # 2:00 pm Caracas
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install setuptools
          pip install undetected-chromedriver selenium gspread google-auth

      - name: Ejecutar scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          WORKSHEET_NAME: ${{ secrets.WORKSHEET_NAME }}
          DATE_CELL: ${{ secrets.DATE_CELL }}
          EURO_CELL: ${{ secrets.EURO_CELL }}
          DOLAR_CELL: ${{ secrets.DOLAR_CELL }}
        run: python bcv_to_sheets.py
